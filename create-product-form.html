<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Product</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; background-color: #f4f4f6; margin: 0; padding: 40px 20px; }
    .form-container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2px solid #eee; }
    h1 { font-size: 24px; margin-bottom: 20px; color: #333; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: #555; }
    input[type="text"], textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 14px; font-family: inherit; }
    textarea { height: 100px; resize: vertical; }
    input:focus, textarea:focus { border-color: rgb(79, 178, 61); outline: none; }
    .submit-btn { width: 100%; background: rgb(79, 178, 61); color: white; border: none; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    .submit-btn:hover { background: rgb(65, 150, 50); }
    .back-btn { display: inline-block; margin-bottom: 20px; color: #666; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>

  <div class="form-container">
    <a href="product-card.html" class="back-btn">← Back to catalog</a>
    <h1>Add New Product</h1>
    
    <form id="create-product-form">
      <div class="form-group">
        <label for="prod-title">Product Name</label>
        <input type="text" id="prod-title" required placeholder="e.g., Advanced Balloon Decorating">
      </div>
      
      <div class="form-group">
        <label for="prod-img">Image URL or Path</label>
        <input type="text" id="prod-img" required placeholder="e.g., card thumbnail/thumbnail-2.jpeg">
      </div>
      
      <div class="form-group">
        <label for="prod-desc">Short Description (for Catalog Card)</label>
        <input type="text" id="prod-desc" required placeholder="e.g., Learn how to create stunning...">
      </div>

      <div class="form-group">
        <label for="prod-full-desc">Full Description (for Product Page)</label>
        <textarea id="prod-full-desc" required placeholder="Detailed information about the course..."></textarea>
      </div>
      
      <div class="form-group">
        <label for="prod-price">Price (with currency symbol)</label>
        <input type="text" id="prod-price" required placeholder="e.g., $4.99">
      </div>
      
      <button type="submit" class="submit-btn">Save Product</button>
    </form>
  </div>

  <script>
    document.getElementById('create-product-form').addEventListener('submit', (e) => {
      e.preventDefault();

      const title = document.getElementById('prod-title').value;
      const img = document.getElementById('prod-img').value;
      const desc = document.getElementById('prod-desc').value;
      const fullDesc = document.getElementById('prod-full-desc').value;
      const price = document.getElementById('prod-price').value;

      // Генерируем уникальный ID для ссылки
      const productId = 'prod-' + Date.now();

      const newProduct = { title, img, desc, fullDesc, price };
      const storedProducts = JSON.parse(localStorage.getItem('customProducts')) || {};
      
      storedProducts[productId] = newProduct;
      localStorage.setItem('customProducts', JSON.stringify(storedProducts));

      // Возврат на вашу страницу каталога
      window.location.href = 'product-card.html';
    });
  </script>
</body>
</html>
