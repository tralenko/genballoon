<!DOCTYPE html>
<html>
<head>
  <title>GenSpace — Cart</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/footer.css">
  <script defer src="js/header.js"></script>
  <script defer src="js/cart.js"></script>
  <style>
    .cart-wrap { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
    .cart-title { font-size: 22px; font-weight: 500; letter-spacing: 2px; 
                  border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 2rem; }
    .cart-layout { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; align-items: start; }
    @media(max-width: 640px) { .cart-layout { grid-template-columns: 1fr; } }
    .cart-items { display: flex; flex-direction: column; gap: 12px; }
    .cart-item { background: #fff; border: 1px solid #eee; border-radius: 12px;
                 padding: 1rem; display: flex; align-items: center; gap: 1rem; }
    .cart-item-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover;
                     background: #f0f0f0; flex-shrink: 0; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .cart-item-type { font-size: 12px; color: #888; }
    .cart-item-price { font-size: 16px; font-weight: 500; white-space: nowrap; }
    .cart-remove-btn { background: none; border: none; cursor: pointer; color: #aaa;
                       padding: 6px; border-radius: 8px; font-size: 20px; line-height:1; }
    .cart-remove-btn:hover { background: #fff0f0; color: #e24b4a; }
    .summary-card { background: #fff; border: 1px solid #eee; border-radius: 12px;
                    padding: 1.25rem; position: sticky; top: 1rem; }
    .summary-label { font-size: 13px; color: #888; letter-spacing: 1px; margin-bottom: 1rem; font-weight: 500; }
    .summary-row { display: flex; justify-content: space-between; font-size: 14px;
                   color: #666; margin-bottom: 10px; }
    .summary-divider { border: none; border-top: 1px solid #eee; margin: 1rem 0; }
    .summary-total { display: flex; justify-content: space-between; font-size: 18px;
                     font-weight: 500; margin-bottom: 1.25rem; }
    .checkout-btn { width: 100%; padding: 13px; background: #111; color: #fff; border: none;
                    border-radius: 8px; font-size: 13px; font-weight: 500; letter-spacing: 1px;
                    cursor: pointer; transition: opacity 0.15s; }
    .checkout-btn:hover { opacity: 0.8; }
    .checkout-btn:disabled { opacity: 0.4; cursor: default; }
    .empty-cart { text-align: center; padding: 5rem 2rem; color: #aaa; }
    .empty-cart h2 { font-size: 18px; margin-bottom: 1rem; color: #555; }
    .cart-badge-title { display: inline-block; background: #111; color: #fff;
                        border-radius: 50px; font-size: 12px; padding: 2px 10px; margin-left: 10px; }
  </style>
</head>
<body>

  <header class="header">
      <button class="header-burger-btn" id="burger">
        <span></span><span></span><span></span>
      </button>
      <div class="logo" id="logo">
        <div>
          <div class="logo-txt">
            <p>GEN</p>
          </div>
        </div>
        <div class="page-name">
          <p>SHOP</p>
        </div>
      </div>
      <div class="menu-buttons-row">
        <div class="menu-button-box">
          <button class="menu-button" onclick="window.location.href='index.html';">
            <img src="icons/home.png">
            HOME
          </button>
        </div>
        <div class="menu-button-box">
          <button class="menu-button" onclick="window.location.href='product-catalog.html';">
            <img src="icons/shop.png">
            SHOP
          </button>
      </div>
        <div class="menu-button-box">
          <button class="menu-button" onclick="window.location.href='course-catalog.html';">
            <img src="icons/courses.png">
            COURSES
          </button>
        </div>
        <div class="menu-button-box">
          <button class="menu-button">
            <img src="icons/support.png">
            SUPPORT
          </button>
        </div>
        <div class="menu-button-box">
          <button class="menu-button" onclick="window.location.href='auth.html';">
            <img src="icons/log in.png">
            LOG IN
          </button>
        </div>
      </div>
      <div class="cart">
        <button class="cart-button" onclick="window.location.href='cart.html'">
          <img src="icons/cart-2.png">
          <span class="cart-badge" style="
            display: none;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            right: 0px;
            color: #111;
            font-size: 22px;
            font-weight: 500;
            pointer-events: none;
            line-height: 1;
          ">0</span>
        </button>
      </div>
    </header>
  

  <div class="cart-wrap">
    <h1 class="cart-title" id="cart-heading">CART</h1>
    <div id="cart-root"></div>
  </div>

  <script>
  function renderCart() {
    const cart = getCart();
    const root = document.getElementById("cart-root");
    const heading = document.getElementById("cart-heading");

    heading.innerHTML = `CART <span class="cart-badge-title">${cart.length}</span>`;

    if (cart.length === 0) {
      root.innerHTML = `
        <div class="empty-cart">
          <h2>Your cart is empty</h2>
          <p>Browse the <a href="product-catalog.html">shop</a> and add something!</p>
        </div>`;
      return;
    }

    const total = cart.reduce((sum, i) => sum + parseFloat(i.price), 0).toFixed(2);

    root.innerHTML = `
      <div class="cart-layout">
        <div class="cart-items" id="items-list"></div>
        <div class="summary-card">
          <p class="summary-label">ORDER SUMMARY</p>
          <div class="summary-row"><span>Items (${cart.length})</span><span>$${total}</span></div>
          <hr class="summary-divider">
          <div class="summary-total"><span>Total</span><span>$${total}</span></div>
          <button class="checkout-btn" id="checkout-btn">CHECKOUT</button>
          <p style="font-size:11px;color:#aaa;text-align:center;margin-top:10px">Secure checkout · Instant access</p>
        </div>
      </div>`;

    const list = document.getElementById("items-list");
    cart.forEach(item => {
      const el = document.createElement("div");
      el.className = "cart-item";
      el.innerHTML = `
        <img class="cart-item-img" src="${item.image_url || ''}" 
             onerror="this.style.background='#f0f0f0';this.src=''">
        <div class="cart-item-info">
          <p class="cart-item-name">${item.title}</p>
          <p class="cart-item-type">Digital file</p>
        </div>
        <p class="cart-item-price">$${item.price}</p>
        <button class="cart-remove-btn" data-id="${item.id}" title="Remove">✕</button>`;
      list.appendChild(el);
    });

    document.querySelectorAll(".cart-remove-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        removeFromCart(btn.dataset.id);
        renderCart();
      });
    });

    document.getElementById("checkout-btn").addEventListener("click", handleCheckout);
  }

  async function handleCheckout() {
    const btn = document.getElementById("checkout-btn");
    btn.disabled = true;
    btn.textContent = "PROCESSING...";

    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) {
      window.location.href = "auth.html";
      return;
    }

    const cart = getCart();
    const rows = cart.map(item => ({ user_id: user.id, product_id: item.id }));

    const { error } = await supabaseClient.from("purchases").insert(rows);

    if (error) {
      alert("Something went wrong. Please try again.");
      btn.disabled = false;
      btn.textContent = "CHECKOUT";
      return;
    }

    // очищаем корзину после успешной покупки
    saveCart([]);
    window.location.href = "index.html?success=1"; // или на страницу "спасибо"
  }

  document.addEventListener("DOMContentLoaded", renderCart);
  </script>
</body>
</html>
